<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Alex Carter Photography</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>

/* Internal CSS - About Section */

#about{
background:#f1f1f1;
padding:20px;
text-align:center;
font-size:15px;
}

</style>

<body>

<!-- HEADER (Inline CSS) -->

<header class="text-center bg-dark">
<h1 style="color:white; padding:15px;">Eeman zahra  Photography</h1>
</header>

<div class="container-fluid">

<div class="row">

<!-- ABOUT SECTION -->

<div class="col-lg-3 col-md-12" id="about">

<h4>About Me</h4>

<p>
Professional photographer specializing in weddings,
portraits and travel photography.
Capturing moments that last forever.
</p>

</div>

<!-- GALLERY -->

<div class="col-lg-6 col-md-12 text-center">

<h4 class="mt-2">Portfolio</h4>

<div class="row g-2">

<div class="col-4">
<img src="https://picsum.photos/300?1" class="img-fluid gallery">
</div>

<div class="col-4">
<img src="https://picsum.photos/300?2" class="img-fluid gallery">
</div>

<div class="col-4">
<img src="https://picsum.photos/300?3" class="img-fluid gallery">
</div>

<div class="col-4">
<img src="https://picsum.photos/300?4" class="img-fluid gallery">
</div>

<div class="col-4">
<img src="https://picsum.photos/300?5" class="img-fluid gallery">
</div>

<div class="col-4">
<img src="https://picsum.photos/300?6" class="img-fluid gallery">
</div>

</div>

</div>

<!-- SERVICES + CONTACT -->

<div class="col-lg-3 col-md-12">

<h5 class="text-center mt-2">Services</h5>

<table class="table table-bordered table-sm text-center">

<tr>
<th>Service</th>
<th>Price</th>
<th>Time</th>
</tr>

<tr>
<td>Wedding</td>
<td>$500</td>
<td>5h</td>
</tr>

<tr>
<td>Portrait</td>
<td>$150</td>
<td>1h</td>
</tr>

<tr>
<td>Events</td>
<td>$300</td>
<td>3h</td>
</tr>

</table>


<h5 class="text-center">Contact</h5>

<form>

<input type="text" class="form-control mb-2" placeholder="Name" required>

<input type="email" class="form-control mb-2" placeholder="Email" required>

<input type="tel"
class="form-control mb-2"
pattern="[0-9]{11}"
placeholder="Phone 03XXXXXXXXX">

<textarea class="form-control mb-2" placeholder="Message"></textarea>

<button class="btn btn-primary w-100">Submit</button>

</form>

</div>

</div>

</div>

<!-- FOOTER -->

<footer class="text-center bg-dark text-white p-2 mt-2 footer">

Follow:
<a href="#">Instagram</a>
<a href="#">Facebook</a>
<a href="#">Twitter</a>

</footer>

</html>
